<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldPrice Predictor - Advanced ML Endpoint</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --gold-100: #fef08a;
            --gold-400: #facc15;
            --gold-500: #eab308;
            --gold-600: #ca8a04;
            --bg-base: #020617;
            --bg-panel: rgba(15, 23, 42, 0.4);
            --border-glow: rgba(250, 204, 21, 0.15);
            --text-100: #f8fafc;
            --text-300: #cbd5e1;
            --text-500: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-100);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Animated Background Orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            animation: float 20s infinite alternate cubic-bezier(0.5, 0.05, 0.5, 0.95);
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            background: rgba(234, 179, 8, 0.15);
            top: -10vw;
            left: -10vw;
        }

        .orb-2 {
            width: 35vw;
            height: 35vw;
            background: rgba(14, 165, 233, 0.1);
            bottom: -5vw;
            right: -10vw;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        /* Main App Container */
        .app-container {
            width: 100%;
            max-width: 520px;
            padding: 2.5rem;
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 
                0 0 0 1px var(--border-glow) inset,
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                0 0 100px -20px rgba(250, 204, 21, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .glass-panel:hover {
            border-color: rgba(250, 204, 21, 0.3);
            box-shadow: 
                0 0 0 1px rgba(250, 204, 21, 0.2) inset,
                0 30px 60px -12px rgba(0, 0, 0, 0.9),
                0 0 120px -20px rgba(250, 204, 21, 0.1);
            transform: translateY(-8px) rotateX(2deg);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        /* Decorative header accent */
        header::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-500), transparent);
            margin: 1.5rem auto 0;
            border-radius: 4px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-100) 0%, var(--gold-100) 50%, var(--gold-500) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-300);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .input-group {
            position: relative;
        }

        /* Full width for volume */
        .form-grid .input-group:last-child {
            grid-column: span 2;
        }

        .input-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            background: rgba(250, 204, 21, 0.03);
            border-color: rgba(250, 204, 21, 0.4);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.1);
        }

        .input-wrapper label {
            position: absolute;
            top: 0.5rem;
            left: 1rem;
            font-size: 0.75rem;
            color: var(--text-500);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .input-wrapper:focus-within label {
            color: var(--gold-400);
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-100);
            padding: 1.75rem 1rem 0.75rem;
            font-size: 1.15rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.1);
            font-weight: 400;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Action Button */
        .btn-glow {
            position: relative;
            width: 100%;
            background: transparent;
            border: none;
            padding: 2px; /* Border thickness */
            border-radius: 16px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .btn-glow::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 40%, var(--gold-400) 50%, transparent 60%, transparent 100%);
            animation: spin 3s linear infinite;
            transform-origin: center center;
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }

        .btn-glow:hover::before {
            opacity: 1;
        }

        .btn-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-radius: 14px;
            padding: 1.25rem;
            width: 100%;
            height: 100%;
            z-index: 2;
            color: var(--text-100);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .btn-glow:hover .btn-content {
            background: linear-gradient(to bottom, #334155, #1e293b);
            color: var(--gold-100);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 30px rgba(250, 204, 21, 0.2);
        }

        .btn-glow:active {
            transform: scale(0.98);
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Results Display */
        .result-panel {
            margin-top: 2.5rem;
            background: linear-gradient(180deg, rgba(20, 83, 45, 0.1) 0%, rgba(20, 83, 45, 0) 100%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            
            /* Hidden state */
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
            pointer-events: none;
        }

        .result-panel.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            max-height: 200px; /* arbitrary height to allow expansion */
            padding-top: 2rem;
            padding-bottom: 2rem;
            border-width: 1px;
            pointer-events: all;
        }

        /* Success top glow */
        .result-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            box-shadow: 0 0 15px #10b981;
        }

        .result-label {
            font-size: 0.85rem;
            color: #34d399;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.75rem;
        }

        .result-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
            background: linear-gradient(to bottom, #ffffff, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Loading Indicator */
        .data-stream {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            gap: 4px;
        }

        .data-stream.active {
            display: flex;
        }

        .data-stream span {
            width: 4px;
            height: 16px;
            background: var(--gold-400);
            border-radius: 2px;
            animation: pulse 1s infinite ease-in-out;
        }

        .data-stream span:nth-child(2) { animation-delay: 0.2s; }
        .data-stream span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scaleY(0.5); opacity: 0.3; }
            50% { transform: scaleY(1.5); opacity: 1; box-shadow: 0 0 10px var(--gold-400); }
        }

    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="app-container">
        <div class="glass-panel">
            <header>
                <h1>GoldPrice ML</h1>
                <p class="subtitle">Next-Generation Predictive Analytics Engine</p>
            </header>

            <form id="predictForm">
                <div class="form-grid">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="open">Open (USD)</label>
                            <input type="number" id="open" step="any" placeholder="150.50" autocomplete="off" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="high">High (USD)</label>
                            <input type="number" id="high" step="any" placeholder="152.00" autocomplete="off" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="low">Low (USD)</label>
                            <input type="number" id="low" step="any" placeholder="149.80" autocomplete="off" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="volume">Trading Volume</label>
                            <input type="number" id="volume" step="any" placeholder="8500000" autocomplete="off" required>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-glow" id="btnPredict">
                    <div class="btn-content">
                        <span id="btnText">Execute Prediction</span>
                        <div class="data-stream" id="btnLoader">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </button>
            </form>

            <div class="result-panel" id="resultContainer">
                <div class="result-label">Predicted Close Price</div>
                <div class="result-value" id="resultValue">--</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btnPredict').addEventListener('click', async () => {
            const openVal = document.getElementById('open').value;
            const highVal = document.getElementById('high').value;
            const lowVal = document.getElementById('low').value;
            const volVal = document.getElementById('volume').value;

            if(!openVal || !highVal || !lowVal || !volVal) {
                alert("SYSTEM ERROR: Missing data parameters.");
                return;
            }

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const resultContainer = document.getElementById('resultContainer');
            const resultValue = document.getElementById('resultValue');

            // Trigger loading state
            btnText.style.opacity = '0';
            btnLoader.classList.add('active');
            
            // Hide previous result if exists
            resultContainer.classList.remove('show');

            try {
                // Minimum aesthetic delay for visual feedback
                const processRequest = fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        open: parseFloat(openVal),
                        high: parseFloat(highVal),
                        low: parseFloat(lowVal),
                        volume: parseFloat(volVal)
                    })
                });
                
                const minAnimationTime = new Promise(resolve => setTimeout(resolve, 800));
                
                const [response] = await Promise.all([processRequest, minAnimationTime]);

                if(response.ok) {
                    const data = await response.json();
                    
                    // Format currency nicely
                    const formatter = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD',
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });

                    // Start counter animation
                    resultContainer.classList.add('show');
                    animateValue(resultValue, 0, data.predictedClose, 1000, formatter);
                    
                } else if (response.status === 429) {
                    alert('RATE LIMIT EXCEEDED: Defensive measures engaged.');
                } else {
                    alert('API FAILED: Unable to process prediction.');
                }
            } catch (err) {
                console.error(err);
                alert('CRITICAL ERROR: Connection to ML Engine lost.');
            } finally {
                // Restore button
                btnLoader.classList.remove('active');
                btnText.style.opacity = '1';
            }
        });

        // Smooth number counter animation
        function animateValue(obj, start, end, duration, formatter) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Ease out expo
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentVal = start + (end - start) * easeOut;
                
                obj.textContent = formatter.format(currentVal);
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.textContent = formatter.format(end); // Ensure exact final value
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
