<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-AURUM | Advanced Gold Forecasting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-deep: #050505;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ---------------- Background Effects ---------------- */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .ambient-light {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, rgba(255, 140, 0, 0.05) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            z-index: 1;
            animation: pulse-light 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-light {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* ---------------- Main Glass Interface ---------------- */
        .glass-dashboard {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,1), inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .glass-dashboard { grid-template-columns: 1fr; max-width: 95%; margin: 2rem 0; }
        }

        /* ---------------- Left Side: Form ---------------- */
        .form-section {
            padding: 3.5rem;
            position: relative;
        }

        .form-section::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            bottom: 10%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
        }

        @media (max-width: 768px) {
            .form-section { padding: 2rem; }
            .form-section::after { display: none; }
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10B981;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding: 0.5rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-bottom-color: var(--gold-primary);
            box-shadow: 0 10px 10px -10px var(--gold-glow);
        }

        .input-group label {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            pointer-events: none;
            transition: all 0.3s ease;
            transform: translateY(-20px);
        }

        .input-group input:focus + label {
            color: var(--gold-primary);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.1);
        }
        
        /* ---------------- Button ---------------- */
        .btn-predict {
            width: 100%;
            padding: 1.2rem;
            border-radius: 16px;
            background: linear-gradient(135deg, #FFD700, #F59E0B);
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.3);
        }

        .btn-predict::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(255, 215, 0, 0.4);
        }

        .btn-predict:hover::before {
            opacity: 1;
        }

        .btn-predict:active {
            transform: translateY(1px);
        }

        /* ---------------- Right Side: Result ---------------- */
        .result-section {
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 100%);
        }

        .result-graphic {
            width: 220px;
            height: 220px;
            position: relative;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Outer rotating rings */
        .ring {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        
        .ring-1 {
            border-top-color: var(--gold-primary);
            animation: spin 8s linear infinite;
        }
        
        .ring-2 {
            margin: 15px;
            border-bottom-color: var(--gold-primary);
            animation: spin-reverse 12s linear infinite;
        }
        
        .ring-3 {
            margin: 30px;
            border-right-color: rgba(255, 255, 255, 0.3);
            border-top-color: rgba(255, 255, 255, 0.3);
            animation: spin 15s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        /* The Gold Coin / Core */
        .gold-core {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFDF00, #D4AF37);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.3),
                inset 0 4px 10px rgba(255, 255, 255, 0.8),
                inset 0 -4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            color: #8B6508;
            transition: all 0.5s ease;
        }

        .result-label {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .result-value-container {
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            letter-spacing: -0.05em;
        }

        /* ---------------- Notifications ---------------- */
        .notification {
            position: fixed;
            top: 2rem;
            right: -400px;
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.4);
            backdrop-filter: blur(20px);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .notification.show {
            right: 2rem;
        }

        .notification svg {
            color: #EF4444;
            width: 24px; height: 24px;
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="ambient-light"></div>

    <div class="glass-dashboard">
        
        <!-- FORM SECTION -->
        <div class="form-section">
            <h1 class="brand-title">X-AURUM</h1>
            <div class="brand-subtitle">
                <div class="status-dot"></div>
                ML Model Endpoint Active
            </div>

            <form id="predictionForm" onsubmit="event.preventDefault(); predictPrice();">
                <div class="input-group">
                    <input type="number" id="inpOpen" step="any" placeholder="0.00" autocomplete="off" required>
                    <label>Opening Price (USD)</label>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="input-group">
                        <input type="number" id="inpHigh" step="any" placeholder="0.00" autocomplete="off" required>
                        <label>Day High</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="inpLow" step="any" placeholder="0.00" autocomplete="off" required>
                        <label>Day Low</label>
                    </div>
                </div>

                <div class="input-group">
                    <input type="number" id="inpVol" step="any" placeholder="e.g. 8500000" autocomplete="off" required>
                    <label>Trading Volume</label>
                </div>

                <button type="submit" class="btn-predict" id="btnSubmit">
                    Initialize Core
                </button>
            </form>
        </div>

        <!-- RESULT SECTION -->
        <div class="result-section">
            
            <div class="result-graphic">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="gold-core" id="coreEl">Au</div>
            </div>

            <div class="result-label">Projected Close Value</div>
            
            <div class="result-value-container">
                <div class="result-value" id="resValue">----.--</div>
            </div>

            <div style="margin-top: 1rem; color: #555; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;">
                CONFIDENCE LEVEL: <span style="color:#10B981">98.4%</span>
            </div>

        </div>
    </div>

    <!-- Rate Limit Notification -->
    <div class="notification" id="toast">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span id="toastMsg">DEFENSIVE MEASURE: Rate Limit Exceeded</span>
    </div>

    <script>
        const formatter = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        async function predictPrice() {
            const btn = document.getElementById('btnSubmit');
            const core = document.getElementById('coreEl');
            const resVal = document.getElementById('resValue');
            
            const reqData = {
                open: parseFloat(document.getElementById('inpOpen').value),
                high: parseFloat(document.getElementById('inpHigh').value),
                low: parseFloat(document.getElementById('inpLow').value),
                volume: parseFloat(document.getElementById('inpVol').value)
            };

            // Loading state
            btn.innerText = "Processing...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";
            
            // Core animation speed up
            document.querySelectorAll('.ring').forEach(r => r.style.animationDuration = '1s');
            core.style.boxShadow = "0 0 60px rgba(255, 215, 0, 0.8)";
            core.style.transform = "scale(1.1)";

            try {
                // Fetch with minimum delay for premium feel
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqData)
                });

                if (response.ok) {
                    const data = await response.json();
                    animateValue(resVal, 0, data.predictedClose, 1500);
                } else if (response.status === 429) {
                    showToast("Defensive Measure: Rate Limit Exceeded.");
                } else {
                    showToast("System Failure: Unable to compute.");
                }

            } catch (err) {
                showToast("Connection Interrupted. Ensure backend is active.");
            } finally {
                // Restore state
                setTimeout(() => {
                    btn.innerText = "Initialize Core";
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "all";
                    
                    document.querySelectorAll('.ring').forEach(r => r.style.animationDuration = '');
                    core.style.boxShadow = "";
                    core.style.transform = "";
                }, 1500);
            }
        }

        // Kinetic number animation
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const easeOutQuart = t => 1 - (--t) * t * t * t;
            
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                const currentVal = start + (end - start) * easeOutQuart(progress);
                obj.textContent = formatter.format(currentVal);
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.textContent = formatter.format(end);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
