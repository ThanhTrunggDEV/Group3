# ==========================================
# REVERSE PROXY CONFIGURATION (NGINX)
# ==========================================
# Hướng dẫn triển khai trên Server (Ubuntu/CentOS):
# 1. SSH vào Server của bạn.
# 2. Xóa cấu hình mặc định: sudo rm /etc/nginx/sites-enabled/default
# 3. Tạo file mới: sudo nano /etc/nginx/sites-available/nttspace.site
# 4. Copy toàn bộ nội dung bên dưới dán vào file đó.
# 5. Lưu lại và kích hoạt: sudo ln -s /etc/nginx/sites-available/nttspace.site /etc/nginx/sites-enabled/
# 6. Kiểm tra cú pháp Nginx: sudo nginx -t
# 7. Khởi động lại Nginx: sudo systemctl restart nginx
# 8. (Khuyến nghị) Bật SSL miễn phí: sudo certbot --nginx -d nttspace.site

server {
    listen 80;
    listen [::]:80;
    
    server_name nttspace.site www.nttspace.site;

    location / {
        # Đoạn này trỏ traffic từ Web ngoài vào container Docker đang chạy cổng 5235
        proxy_pass http://localhost:5235;

        # Cấu hình chuNn cho ASP.NET Kestrel
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        
        # Chuyển tiếp các thông tin gốc của User sang Backend (để Rate Limit nhận diện IP)
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bật tính năng nén Gzip để Web Server trả JSON nhanh hơn chục lần
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
